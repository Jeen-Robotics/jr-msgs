syntax = "proto3";

package diagnostic_msgs;

import "std_msgs.proto";

// Key-value pairs for diagnostic data
message KeyValue {
  string key = 1;
  string value = 2;
}

// Diagnostic status message
message DiagnosticStatus {
  uint32 level = 1;  // 0=OK, 1=WARN, 2=ERROR, 3=STALE
  string name = 2;
  string message = 3;
  string hardware_id = 4;
  repeated KeyValue values = 5;
}

// Array of diagnostic status messages
message DiagnosticArray {
  std_msgs.Header header = 1;
  repeated DiagnosticStatus status = 2;
}

// Self-test request
message SelfTestRequest {
  // Empty request
}

message SelfTestResponse {
  string id = 1;
  uint32 passed = 2;
  repeated DiagnosticStatus status = 3;
}
